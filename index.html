<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Java to UML Generator</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 2rem; background: #f9fafb; }
      #upload-box { border: 2px dashed #ccc; padding: 2rem; text-align: center; border-radius: 8px; background: white; margin-bottom: 2rem; cursor: pointer; }
      #upload-box:hover { border-color: #666; }
      #uml-output { display: flex; justify-content: center; background: white; padding: 1rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
  </head>
  <body>
    <h1>Java to UML Generator</h1>
    
    <div id="upload-box">
      <p>Drag and drop .java files here, or click to select</p>
      <input type="file" id="file-upload" multiple accept=".java" style="display: none;">
    </div>
    
    <div id="toolbar" style="display: none; justify-content: center; gap: 1rem; margin-bottom: 1rem;">
      <button id="btn-download-svg" style="padding: 0.5rem 1rem; cursor: pointer;">💾 Download SVG</button>
      <button id="btn-download-png" style="padding: 0.5rem 1rem; cursor: pointer;">🖼️ Download PNG</button>
    </div>
    
    <div id="uml-wrapper"
      style="width: 100%; height: 70vh; overflow: hidden; border: 1px solid #e5e7eb; border-radius: 8px; background: white; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
      <div id="uml-output" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;">
        <p style="color: #666;">Your diagram will appear here...</p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
